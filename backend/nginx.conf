# ── Configuración Nginx para Debuta Backend ──────────────────────────────────
# Ruta en el VPS: /etc/nginx/sites-available/debuta
# Activar con: sudo ln -s /etc/nginx/sites-available/debuta /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name debuta.online www.debuta.online;

    # Redirige todo el tráfico HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name debuta.online www.debuta.online;

    # ── Certificados SSL (Let's Encrypt via Certbot) ────────────────────────
    ssl_certificate     /etc/letsencrypt/live/debuta.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/debuta.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Headers de seguridad ────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ── Tamaño máximo de body (uploads de fotos vía Cloudinary) ────────────
    client_max_body_size 25M;

    # ── Socket.io (WebSocket + long-polling) ───────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts largos para conexiones WebSocket persistentes
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 75s;
    }

    # ── APK Server (página de descarga del APK) ────────────────────────────
    location = /apk {
        return 301 /apk/;
    }

    location /apk/ {
        proxy_pass         http://127.0.0.1:3030/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 75s;
    }

    # ── API REST y panel de administración ─────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts para uploads pesados y llamadas largas
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 75s;
    }

    # ── Logs ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/debuta.access.log;
    error_log  /var/log/nginx/debuta.error.log;
}
